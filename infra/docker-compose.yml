services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  whisper:
    image: onerahmet/openai-whisper-asr-webservice
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: base
    restart: always

  waha:
    image: devlikeapro/waha
    ports:
      - "3000:3000"
    volumes:
      - waha_data:/app/.sessions
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
    restart: always

volumes:
  ollama_data:
  waha_data:
