project_id = "muottuojrmsrzpomezav"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:8080"
additional_redirect_urls = ["http://127.0.0.1:8080"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }} ."
max_frequency = "5s"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.mfa.web_authn]
enroll_enabled = false
verify_enabled = false

[analytics]
enabled = false
port = 54327
backend = "postgres"

[functions.ai-coach-trigger]
enabled = true
verify_jwt = false
import_map = "./functions/ai-coach-trigger/deno.json"
entrypoint = "./functions/ai-coach-trigger/index.ts"

[functions.whatsapp-incoming]
enabled = true
verify_jwt = false

[functions.ivy-chat]
enabled = true
verify_jwt = false

[functions.ivy-weekly-summary]
enabled = true
verify_jwt = true

[functions.ivy-weekly-summary-all]
enabled = true
verify_jwt = false

[functions.ivy-budget-alert]
enabled = true
verify_jwt = true

[functions.ivy-coach-insights]
enabled = true
verify_jwt = true
